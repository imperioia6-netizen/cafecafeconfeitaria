# Deploy das Edge Functions do Supabase (evolution-webhook, etc.) sem usar CLI no seu PC.
# Roda no GitHub quando você dá push em main ou quando você dispara manualmente.

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite clicar em "Run workflow" na aba Actions do GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ONLY evolution-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy evolution-webhook --project-ref osewboiklhfiunetoxzo
